# No MySQL/Redis in this stack; use external DB and Redis and set DB_* / REDIS_* in env.
# Main and admin are separate services; both expose 80 (reverse proxy routes by path or domain).

services:
  main:
    build:
      context: ./main
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 80
      BASE_URL: ${BASE_URL:-http://localhost}
      ADMIN_PUBLIC_URL: ${ADMIN_PUBLIC_URL:-http://localhost}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      NODE_ENV: production
    expose:
      - "80"

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_URL: ${ADMIN_APP_URL:-http://localhost}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_CLIENT: phpredis
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    expose:
      - "80"
